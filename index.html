<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Tracker</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:95%;
    max-width:400px;
    background:white;
    padding:20px;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.total-box{
    background:#4CAF50;
    color:white;
    padding:15px;
    border-radius:15px;
    text-align:center;
    margin-bottom:15px;
}

.total-box h2{
    margin-top:5px;
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:1px solid #ddd;
    border-radius:10px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    background:#2196F3;
    color:white;
    border-radius:10px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#1976D2;
}

ul{
    list-style:none;
    margin-top:15px;
}

li{
    background:#f9f9f9;
    margin-bottom:10px;
    padding:12px;
    border-radius:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.delete-btn{
    background:red;
    color:white;
    border:none;
    padding:5px 10px;
    border-radius:5px;
    cursor:pointer;
}

.delete-btn:hover{
    background:darkred;
}
</style>
</head>

<body>

<div class="container">

    <h1>💰 Expense Tracker</h1>

    <div class="total-box">
        <p>Total Expenses</p>
        <h2>₹ <span id="totalAmount">0</span></h2>
    </div>

    <input type="text" id="expenseName" placeholder="Expense Name">

    <input type="number" id="expenseAmount" placeholder="Amount">

    <button onclick="addExpense()">Add Expense</button>

    <ul id="expenseList"></ul>

</div>

<script>

let expenses = JSON.parse(localStorage.getItem("expenses")) || [];

displayExpenses();

function addExpense(){

    const name = document.getElementById("expenseName").value;
    const amount = document.getElementById("expenseAmount").value;

    if(name === "" || amount === ""){
        alert("Please fill all fields");
        return;
    }

    const expense = {
        name:name,
        amount:Number(amount)
    };

    expenses.push(expense);

    localStorage.setItem(
        "expenses",
        JSON.stringify(expenses)
    );

    document.getElementById("expenseName").value="";
    document.getElementById("expenseAmount").value="";

    displayExpenses();
}

function displayExpenses(){

    const list = document.getElementById("expenseList");
    list.innerHTML="";

    let total = 0;

    expenses.forEach((expense,index)=>{

        total += expense.amount;

        const li = document.createElement("li");

        li.innerHTML = `
            <span>
                ${expense.name}
                <br>
                ₹${expense.amount}
            </span>

            <button class="delete-btn"
            onclick="deleteExpense(${index})">
            Delete
            </button>
        `;

        list.appendChild(li);

    });

    document.getElementById("totalAmount").textContent = total;
}

function deleteExpense(index){

    expenses.splice(index,1);

    localStorage.setItem(
        "expenses",
        JSON.stringify(expenses)
    );

    displayExpenses();
}

</script>

</body>
</html>
